events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server {
        listen 3000;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /api {
            resolver 127.0.0.11;
            proxy_pass http://component1:8000;
        }
    }
}
