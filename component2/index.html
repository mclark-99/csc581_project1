<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSC581 Project 1</title>
</head>
<body>
  <h1>Static Site + API Demo</h1>
  <p>This page is served by component2 and requests data from component1.</p>

  <button onclick="getMessage()">Get Backend Message</button>

  <p id="output">No message yet.</p>

  <script>
    async function getMessage() {
      try {
        const response = await fetch("/api");
        const text = await response.text();
        document.getElementById("output").innerText = text;
      } catch (error) {
        document.getElementById("output").innerText =
          "Request failed: " + error.message;
      }
    }
  </script>
</body>
</html>
